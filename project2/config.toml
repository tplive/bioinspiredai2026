# Configuration file
#
# All keys are optional. Missing keys fall back to the built-in defaults.
# CLI flags (e.g. --generations 1000) override values in this file.
#
# Usage:
#   cargo run --release -- --config config.toml
#   cargo run --release -- --config config.toml --generations 1000

# Problem instance
file = "train/train_0.json"

# Results to folder

# Save plots after the run (written inside run_<timestamp>_<instance>_<suffix>/).
plot = false 

# Initialisation
# "random" = shuffle all patient IDs and split evenly across nurses
# "nn"     = nearest-neighbour
# "kmeans" = kmeans clustering, trying for one cluster per nurse or patient, whichever is fewer 
init = "kmeans"

# Hyperparameters
pop_size         = 200          # number of individuals
generations      = 500          # stopping criterion

selection_type   = "tournament" # "tournament" or "truncation"
tournament_size  = 5            # default is 3
selection_ratio  = 0.80         # fraction of population forwarded to parent pool
crossover_rate   = 0.65         # probability crossover is applied per parent pair
mutation_rate    = 0.60         # probability an individual is mutated
mutation_type    = "insert"     # Intra-route mutation operator: "swap" or "insert"
reinsertion_ratio = 0.85        # fraction of offspring in the next generation

# Replace part of the population if no improvement occurs for N generations.
stagnation_replace_after = 180     # Replace part of the population if no improvement occurs for N generations.
stagnation_replace_ratio = 0.90    # % of population to replace

# Number of hill climbing steps to apply when stagnating (100-179 gens without improvement).
hill_climb_steps = 10

# Fitness
penalty_factor   = 10.0         # multiplier per unit of constraint violation

# Optional deterministic random seed (64 hex chars). If omitted, a random seed is
# generated and saved to config_used.toml in the run folder.
random_seed = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

