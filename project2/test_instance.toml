# Configuration file
#
# All keys are optional. Missing keys fall back to the built-in defaults.
# CLI flags (e.g. --generations 1000) override values in this file.
#
# Usage:
#   cargo run --release -- --config config.toml
#   cargo run --release -- --config config.toml --generations 1000

# ── Problem instance ──────────────────────────────────────────────────────────
file = "test_instances/test_instance_1.json"

# ── GA hyper-parameters ───────────────────────────────────────────────────────
pop_size         = 300    # number of individuals
generations      = 1000    # stopping criterion

selection_type   = "tournament" # or "truncation"
tournament_size  = 2            # default is 3
selection_ratio  = 0.6         # fraction of population forwarded to parent pool
crossover_rate   = 0.6         # probability crossover is applied per parent pair
mutation_rate    = 0.6         # probability an individual is mutated

# Intra-route mutation operator: "swap" or "insert"
mutation_type    = "swap"

reinsertion_ratio = 0.85  # fraction of offspring in the next generation

# ── Fitness ───────────────────────────────────────────────────────────────────
penalty_factor   = 10.0   # multiplier per unit of constraint violation

# ── Initialisation ────────────────────────────────────────────────────────────
# "random" – shuffle all patient IDs and split evenly across nurses
# "nn"     – nearest-neighbour heuristic seeding
init = "nn"
